<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperlink Example</title>
    <base href="http://talantacollegeoftechnology.co.ke/">
</head>
<body>
    <p>Click the following link.</p>
    <a href="http://talantacollegeoftechnology.co.ke" target="_self">Talanta College</a>
    <a href="/html/index.html"target="_blank">Opens in New</a>
    <a href="/htmlindex.html"target="_self">Opens in Self</a>
    <a href="/html/index.html"target="_parent">Opens in Parent</a>
    <a href="/html/index.html"target="_top">Opens in Body</a>
</body>
</html>
