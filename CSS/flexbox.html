<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/CSS/flex.css">
</head>
<body>
    <div class="flexcontainer">
        <div class="flexitems" style="flex-grow: 2;">
            <h1>1</h1>
        </div>
        <div class="flexitems" style="flex-shrink: 2;">
            <h2>2</h2>
        </div>
        <div class="flexitems" style="flex-basis: 200px;">
            <h3>3</h3>
        </div>
        <div class="flexitems" style="flex: 0 0 150px;">
            <h1>4</h1>
        </div>
        <div class="flexitems" style="align-self: center;">
            <h1>5</h1>
        </div>
        <div class="flexitems">
            <h1>6</h1>
        </div>
    </div>
 <div class="gridcontainer">
         <div class="griditems">
            <h1>7</h1>
        </div>
        <div class="griditems">
            <h1>8</h1>
        </div>
        <div class="griditems">
            <h1>9</h1>
        </div>
        <div class="griditems">
            <h1>10</h1>
        </div>
</div>
 
</body>
</html>
